<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>WM 2026 – Vollständiges Prognose-Dashboard</title>
<meta name="description" content="WM 2026 interaktives Prognose-Dashboard mit allen 72 Gruppenspielen, K.o.-Runden, Poisson-Analyse, xG-Modell, Bonus-Tipps und Handy-Layout">
<style>
:root{--bg:#0a0d14;--bg2:#111827;--card:#141c2d;--card2:#192338;--line:#2a3550;--text:#eef3ff;--muted:#a8b4cf;--gold:#f3b83b;--red:#ff5d73;--green:#49d28c;--blue:#67a4ff;--violet:#b38bff}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(160deg,var(--bg),var(--bg2) 60%);color:var(--text);min-height:100vh}
.wrap{max-width:1600px;margin:0 auto;padding:16px}
.hero{padding:20px 0 24px;border-bottom:1px solid var(--line)}
.kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:800}
.title{font-size:clamp(32px,6vw,72px);font-weight:900;line-height:.92;margin:10px 0 12px}
.sub{max-width:1100px;color:var(--muted);font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{padding:6px 12px;border-radius:999px;background:color-mix(in srgb,var(--gold) 14%, transparent);border:1px solid color-mix(in srgb,var(--gold) 32%, var(--line));color:var(--gold);font-size:12px;font-weight:800}
.navrow{display:flex;gap:8px;flex-wrap:wrap;padding:18px 0 8px;border-bottom:1px solid var(--line)}
.navbtn{padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:#0f1626;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;transition:.2s}
.navbtn.active{background:var(--gold);color:#111;border-color:var(--gold)}
.section{display:none;padding-top:18px}.section.active{display:block}
.searchrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.searchrow input{flex:1;min-width:220px;background:#0f1626;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px}
.gtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.gtab{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#0f1626;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700}
.gtab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.mcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.mcard{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:.2s}
.mcard:hover{border-color:var(--blue);box-shadow:0 8px 32px rgba(103,164,255,.15)}
.mc-head{padding:10px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mc-grp{padding:4px 8px;border-radius:999px;background:color-mix(in srgb,var(--blue) 18%, transparent);color:var(--blue);font-size:11px;font-weight:800}
.mc-date{font-size:12px;color:var(--muted)}
.mc-venue{font-size:11px;color:var(--muted);flex:1}
.mc-body{padding:14px}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:12px}
.mc-team{text-align:center}
.mc-flag{font-size:28px}
.mc-name{font-weight:800;font-size:14px;margin-top:4px}
.mc-rank{font-size:11px;color:var(--muted)}
.mc-score-box{text-align:center}
.mc-score{font-size:30px;font-weight:900;color:var(--gold);font-family:monospace}
.mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.mc-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mc-bar{flex:1;height:8px;border-radius:999px;overflow:hidden;display:flex;background:var(--line)}
.mc-bh{background:var(--green)}
.mc-bd{background:#7884a3}
.mc-ba{background:var(--red)}
.mc-pct{font-size:12px;font-weight:800;min-width:36px}
.mc-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:10px}
.mc-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.mc-met{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
.mc-met span{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.06em}
.mc-met b{font-size:15px;display:block;margin-top:3px}
.mc-scores{margin-bottom:8px}
.mc-sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.mc-sc-list{display:flex;gap:6px;flex-wrap:wrap}
.sc-pill{padding:5px 9px;border-radius:999px;background:color-mix(in srgb,var(--gold) 14%, transparent);border:1px solid color-mix(in srgb,var(--gold) 30%, var(--line));color:var(--gold);font-size:11px;font-weight:800}
.mc-note{font-size:11px;color:var(--muted);margin-bottom:6px}
.mc-conf{font-size:12px;font-weight:700}
.bcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.bcard{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:16px}
.bc-id{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.bc-frage{font-weight:800;font-size:15px;margin-bottom:8px}
.bc-antwort{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:6px}
.bc-grund{font-size:12px;color:var(--muted);margin-bottom:8px}
.bc-conf{font-size:12px;font-weight:700}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th,.stbl td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
.stbl th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
@media(max-width:720px){
  .mcards{grid-template-columns:1fr}
  .mc-metrics{grid-template-columns:repeat(2,1fr)}
  .mc-teams{gap:4px}
  .mc-flag{font-size:22px}
  .mc-score{font-size:24px}
  .title{font-size:36px}
  .bcards{grid-template-columns:1fr}
}
</style>
<style id="wm-extra">
.mc-flag{font-size:26px;line-height:1;display:block;min-height:1.3em}
.mc-result{margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
.mc-result-header{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin-bottom:6px}
.mc-result-scores{display:flex;gap:16px;align-items:center;font-size:14px;font-weight:700;margin-bottom:6px}
.mc-result-scores .lbl{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:400;margin-right:4px}
.mc-delta{font-size:12px;font-weight:800;padding:3px 10px;border-radius:999px;display:inline-block;margin-top:2px}
.mc-delta.good{background:rgba(73,210,140,.15);color:var(--green)}
.mc-delta.mid{background:rgba(243,184,59,.12);color:var(--gold)}
.mc-delta.bad{background:rgba(255,93,115,.12);color:var(--red)}
.footer{margin-top:30px;padding:18px 0 12px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center}
.footer a{color:var(--blue);text-decoration:none;font-weight:700}
.footer a:hover{text-decoration:underline}
.footer .ver{color:var(--gold);font-weight:800}
.live-badge{display:inline-block;padding:2px 8px;border-radius:999px;background:rgba(255,93,115,.2);color:var(--red);font-size:10px;font-weight:800;letter-spacing:.08em;margin-left:6px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="wrap">
PLACEHOLDER_FULL_CONTENT
</div>
</body>
</html>
