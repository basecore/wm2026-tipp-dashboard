name: 🔄 WM 2026 Ergebnisse aktualisieren

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Dependencies
        run: pip install requests

      - name: ⚽ Ergebnisse abrufen
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_results.py

      - name: 💾 Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "🤖 results.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
